name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        run: |
          set -euo pipefail
          find php-demo wordpress-plugin -type f -name '*.php' -print0 | xargs -0 -n1 php -l

  python-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: |
          set -euo pipefail
          python -m py_compile python-bridge/server.py examples/scripts/tmuxsvc-http.example.py

  node-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Node.js demo syntax
        run: |
          set -euo pipefail
          node --check node-demo/server.js
          node --check node-bridge/server.js
